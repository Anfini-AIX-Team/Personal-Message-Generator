<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面談案内メッセージ生成</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap');

  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --border: #E4E7EC;
    --accent: #3B6EF0;
    --accent-light: #EEF2FF;
    --text-primary: #111827;
    --text-secondary: #6B7280;
    --text-muted: #9CA3AF;
    --tag-bg: #F3F4F6;
    --success: #10B981;
    --radius: 10px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    font-size: 14px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px;
  }

  header h1 { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  header span { font-size: 12px; color: var(--text-muted); }

  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  .left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  .upload-area {
    margin: 16px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
  }

  .upload-area:hover, .upload-area.drag {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .upload-area .icon { font-size: 28px; margin-bottom: 8px; }
  .upload-area p { font-size: 13px; color: var(--text-secondary); }
  .upload-area strong { color: var(--accent); }
  #fileInput { display: none; }

  .list-header {
    padding: 10px 16px 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .candidate-list { flex: 1; overflow-y: auto; }

  .candidate-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .candidate-item:hover { background: var(--bg); }
  .candidate-item.active { background: var(--accent-light); border-left: 3px solid var(--accent); }
  .candidate-item .name { font-weight: 600; font-size: 14px; color: var(--text-primary); }
  .candidate-item .meta { font-size: 12px; color: var(--text-secondary); margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; }

  .badge { display: inline-block; padding: 1px 7px; border-radius: 20px; font-size: 11px; font-weight: 500; background: var(--tag-bg); color: var(--text-secondary); }
  .badge.scout { background: #FEF3C7; color: #92400E; }
  .badge.self { background: #DCFCE7; color: #166534; }

  .right { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

  .profile-pane {
    flex: 0 1 auto;
    max-height: 42%;
    min-height: 52px;
    overflow: hidden;
    border-bottom: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }

  .profile-pane-header {
    flex-shrink: 0;
    padding: 10px 18px;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .profile-pane-header:hover { background: var(--bg); }
  .profile-pane-body { overflow-y: auto; flex: 1; }

  .action-pane {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 10px;
    text-align: center;
  }

  .empty-state .icon { font-size: 40px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }

  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle-icon { transition: transform 0.2s; font-style: normal; font-size: 11px; color: var(--text-muted); }
  .toggle-icon.open { transform: rotate(180deg); }

  .profile-section { padding: 12px 18px 16px; border-bottom: 1px solid var(--border); }
  .profile-section:last-child { border-bottom: none; }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--accent-light);
  }

  .field-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 16px; }
  .field-item { display: flex; flex-direction: column; gap: 2px; }
  .field-item.full { grid-column: 1 / -1; }
  .field-item .fkey { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .field-item .fval { font-size: 12px; color: var(--text-primary); white-space: pre-wrap; line-height: 1.5; }

  .prompt-section { padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
  .prompt-section label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }

  textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text-primary);
    resize: vertical;
    outline: none;
    line-height: 1.6;
    background: var(--bg);
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent); background: #fff; }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #2f5de0; }
  .btn-secondary { background: var(--bg); color: var(--text-primary); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .gemini-btn {
    background: linear-gradient(135deg, #4285F4, #34A853);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.15s;
    text-decoration: none;
  }
  .gemini-btn:hover { opacity: 0.88; }

  .copy-toast { font-size: 12px; color: var(--success); opacity: 0; transition: opacity 0.3s; }
  .copy-toast.show { opacity: 1; }

  /* ===== Auth Modal ===== */
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:center;justify-content:center; }
  .modal-overlay.hidden { display:none; }
  .modal { background:var(--surface);border-radius:16px;padding:36px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.18); }
  .modal-icon { font-size:32px;margin-bottom:12px; }
  .modal h2 { font-size:18px;font-weight:700;margin-bottom:6px; }
  .modal p { font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.6; }
  .modal input { width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:var(--bg);outline:none;margin-bottom:10px; }
  .modal input:focus { border-color:var(--accent);background:#fff; }
  .modal .btn-primary { width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer; }
  .modal .btn-primary:hover { background:#2f5de0; }
  .modal .btn-primary:disabled { opacity:0.6;cursor:not-allowed; }
  .modal-status { font-size:12px;text-align:center;min-height:18px;margin-top:10px; }
</style>
</head>
<body>

<!-- Auth Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon">🔐</div>
    <h2>パスワードを入力</h2>
    <p>管理者から共有されたパスワードを入力してください。<br>認証後、自動でAIが使えるようになります。</p>
    <input type="password" id="modalPassword" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')verifyPassword()">
    <button class="btn-primary" onclick="verifyPassword()" id="modalBtn">🔓 ログイン</button>
    <div class="modal-status" id="modalStatus"></div>
  </div>
</div>

<header>
  <div class="logo">✉</div>
  <div><h1>面談案内メッセージ生成</h1></div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;">
      <span id="authStatusText" style="color:var(--text-muted);">🔒 未認証</span>
      <button onclick="showModal()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:var(--text-secondary);">変更</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <label style="font-size:12px;color:var(--text-muted);white-space:nowrap;">モデル</label>
      <select id="modelSelect" style="border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;outline:none;font-family:inherit;background:var(--bg);color:var(--text-primary);cursor:pointer;">
        <option value="gemini-2.5-flash">gemini-2.5-flash（推奨）</option>
        <option value="gemini-2.0-flash">gemini-2.0-flash</option>
        <option value="gemini-1.5-flash-latest">gemini-1.5-flash-latest</option>
        <option value="gemini-1.5-pro-latest">gemini-1.5-pro-latest</option>
      </select>
    </div>
  </div>
</header>

<div class="layout">
  <div class="left">
    <div class="upload-area" id="uploadArea">
      <div class="icon">📂</div>
      <p><strong>CSVファイルをドロップ</strong><br>またはクリックして選択</p>
      <input type="file" id="fileInput" accept=".csv">
    </div>
    <div class="list-header">
      <span>候補者一覧</span>
      <span id="countLabel" style="color:var(--text-muted)"></span>
    </div>
    <div class="candidate-list" id="candidateList">
      <div style="padding:24px 16px; color:var(--text-muted); font-size:13px; text-align:center;">
        CSVをアップロードしてください
      </div>
    </div>
  </div>

  <div class="right" id="rightPanel">
    <div class="empty-state" style="height:100%;justify-content:center;">
      <div class="icon">👈</div>
      <div>
        <strong>候補者を選択してください</strong><br>
        <span style="font-size:12px;">左のリストから候補者を選ぶと、<br>面談案内メッセージを自動生成します</span>
      </div>
    </div>
  </div>
</div>

<script>

// ===== GAS Proxy 設定 =====
// ここのURLを自分のGASデプロイURLに変更してください
const GAS_URL = 'https://script.google.com/macros/s/AKfycbydOMU-0h1CpxVDDRgIPzUGU-dc5jt5Ubv_qbDqWNBG8giMxmbWjV33gFqfp_un91iN/exec';
const APP_ID  = 'index';

let _gasPassword = '';

// ===== POST-based GAS helper =====
// GETのURL長制限を回避するためPOSTで送信
function callGAS(params) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      reject(new Error('タイムアウト：GASに接続できませんでした'));
    }, 15000);

    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(params)
    })
    .then(r => r.json())
    .then(data => {
      clearTimeout(timer);
      resolve(data);
    })
    .catch(err => {
      clearTimeout(timer);
      reject(new Error('GASへの接続に失敗しました'));
    });
  });
}

// ===== パスワード認証 =====
async function verifyPassword() {
  const pw  = document.getElementById('modalPassword').value;
  const btn = document.getElementById('modalBtn');
  if (!pw) { setModalStatus('⚠️ パスワードを入力してください', '#EF4444'); return; }
  btn.disabled = true; btn.textContent = '🔄 認証中...';
  setModalStatus('', '');
  try {
    const data = await callGAS({ password: pw, prompt: '__auth_check__', appId: APP_ID, model: 'gemini-1.5-flash-latest' });
    if (data.success) {
      _gasPassword = pw;
      sessionStorage.setItem('gas_pw', pw);
      document.getElementById('modalOverlay').classList.add('hidden');
      document.getElementById('authStatusText').textContent = '✅ 認証済み';
      document.getElementById('authStatusText').style.color = '#10B981';
    } else {
      setModalStatus('❌ ' + (data.error || 'パスワードが違います'), '#EF4444');
    }
  } catch(err) {
    setModalStatus('❌ ' + err.message, '#EF4444');
  } finally {
    btn.disabled = false; btn.textContent = '🔓 ログイン';
  }
}

function showModal() {
  document.getElementById('modalOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('modalPassword').focus(), 100);
}

function setModalStatus(msg, color) {
  const el = document.getElementById('modalStatus');
  if (el) { el.textContent = msg; el.style.color = color; }
}

window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('gas_pw');
  if (saved) {
    _gasPassword = saved;
    document.getElementById('modalOverlay').classList.add('hidden');
    document.getElementById('authStatusText').textContent = '✅ 認証済み';
    document.getElementById('authStatusText').style.color = '#10B981';
  }
});

// ===== Model helper =====
function getSelectedModel() {
  const sel = document.getElementById('modelSelect');
  return sel ? sel.value : 'gemini-2.5-flash';
}

// ===== Generate message =====
async function generateMessage() {
  if (!_gasPassword) {
    setStatus('⚠️ 先にパスワードでログインしてください', '#EF4444');
    showModal();
    return;
  }
  if (!selected) {
    setStatus('⚠️ 候補者を選択してください', 'var(--text-muted)');
    return;
  }
  const model = getSelectedModel();
  const instruction = document.getElementById('instructionBox').value;
  const prompt = buildPrompt(selected, instruction);
  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.textContent = '⏳ 生成中...';
  setStatus(model + ' で生成中...', 'var(--text-muted)');
  try {
    const data = await callGAS({ password: _gasPassword, prompt, model, appId: APP_ID });
    if (!data.success) throw new Error(data.error || '生成失敗');
    document.getElementById('messageBox').value = data.text;
    document.getElementById('messageResult').style.display = 'flex';
    document.getElementById('messageResult').style.flexDirection = 'column';
    document.getElementById('messageResult').style.gap = '10px';
    const pane = document.getElementById('profilePane');
    const body = document.getElementById('profileBody');
    const icon = document.getElementById('profileToggleIcon');
    if (pane && body && icon && icon.classList.contains('open')) {
      body.style.display = 'none';
      pane.style.maxHeight = '52px';
      icon.classList.remove('open');
      icon.textContent = '▲';
    }
    setStatus('✅ 生成完了', '#10B981');
    setTimeout(() => setStatus('', ''), 3000);
  } catch (err) {
    setStatus('❌ ' + err.message, '#EF4444');
    if (err.message.includes('パスワード')) showModal();
  } finally {
    btn.disabled = false; btn.textContent = '✦ メッセージを再生成する';
  }
}

// ===== CSV Parser =====
function parseCSV(text) {
  const lines = [];
  let cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === '\n' && !inQ) { lines.push(cur); cur = ''; }
    else { cur += c; }
  }
  if (cur) lines.push(cur);

  const parseRow = row => {
    const cells = []; let cell = '', inQ = false;
    for (let i = 0; i < row.length; i++) {
      const c = row[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cells.push(cell.trim()); cell = ''; }
      else { cell += c; }
    }
    cells.push(cell.trim());
    return cells;
  };

  const headers = parseRow(lines[0].replace(/^\uFEFF/, ''));
  return lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = parseRow(l);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] || ''; });
    return obj;
  });
}

// ===== Toggle profile panel =====
function toggleProfile() {
  const pane = document.getElementById('profilePane');
  const body = document.getElementById('profileBody');
  const icon = document.getElementById('profileToggleIcon');
  if (!pane || !body) return;
  const isOpen = icon.classList.contains('open');
  if (isOpen) {
    body.style.display = 'none';
    pane.style.maxHeight = '52px';
    icon.classList.remove('open');
    icon.textContent = '▲';
  } else {
    body.style.display = '';
    pane.style.maxHeight = '42%';
    icon.classList.add('open');
    icon.textContent = '▲';
  }
}

// ===== Build full profile HTML =====
function buildFullProfile(c) {
  const f = (key) => c[key] && c[key].trim() ? c[key].trim() : null;
  const fi = (key, label, full=false) => {
    const v = f(key); if (!v) return '';
    return `<div class="field-item${full?' full':''}"><span class="fkey">${label}</span><span class="fval">${esc(v)}</span></div>`;
  };

  let html = '';

  const basic = [
    fi('候補者氏名_姓','姓'), fi('候補者氏名_名','名'),
    fi('候補者氏名フリガナ_セイ','フリガナ（姓）'), fi('候補者氏名フリガナ_メイ','フリガナ（名）'),
    fi('性別','性別'), fi('生年月日','生年月日'), fi('年齢','年齢'),
    fi('現住所','現住所',true),
    fi('メールアドレス','メール',true), fi('電話番号','電話番号'),
    fi('応募経路','応募経路'), fi('キャリア状況','キャリア状況'),
    fi('応募日','応募日'), fi('選考ステップ','選考ステップ'),
  ].filter(Boolean).join('');
  if (basic) html += section('📋 基本情報', basic);

  const job = [
    fi('応募求人タイトル','応募求人',true), fi('応募職種','応募職種',true),
    fi('応募メッセージ','応募メッセージ',true), fi('選考メモ','選考メモ',true),
  ].filter(Boolean).join('');
  if (job) html += section('💼 応募情報', job);

  let edu = '';
  for (let i = 1; i <= 3; i++) {
    const s = f(`学歴${i} 学校名`); if (!s) continue;
    edu += fi(`学歴${i} 学校名`, `学校${i}`);
    edu += fi(`学歴${i} 学部・学科`, `学部・学科${i}`);
    edu += fi(`学歴${i} 学校種別`, `種別${i}`);
    edu += fi(`学歴${i} 文理区分`, `文理${i}`);
    edu += fi(`学歴${i} 卒業区分`, `卒業区分${i}`);
    edu += fi(`学歴${i} 卒業年月`, `卒業年月${i}`);
  }
  if (edu) html += section('🎓 学歴', edu);

  const lang = [
    fi('語学力','語学力',true), fi('TOEIC','TOEIC'), fi('TOEFL','TOEFL'),
    fi('その他の語学（1）','その他語学1'), fi('その他の語学（2）','その他語学2'),
    fi('その他の語学（3）','その他語学3'),
  ].filter(Boolean).join('');
  if (lang) html += section('🌐 語学', lang);

  const skill = [
    fi('資格','資格',true), fi('その他経験・スキル','その他スキル',true),
    fi('経験職種','経験職種',true), fi('経験社数','経験社数'),
  ].filter(Boolean).join('');
  if (skill) html += section('🛠 資格・スキル', skill);

  let career = '';
  for (let i = 1; i <= 10; i++) {
    const co = f(`職歴${i}の会社名`); if (!co) continue;
    career += `<div class="field-item full"><span class="fkey">職歴${i}: ${esc(co)}</span></div>`;
    career += fi(`職歴${i}の期間`, `　期間${i}`);
    career += fi(`職歴${i}の雇用形態`, `　雇用形態${i}`);
    career += fi(`職歴${i}の部門・役職`, `　部門・役職${i}`);
    career += fi(`職歴${i}の職務内容`, `　職務内容${i}`, true);
  }
  if (career) html += section('🏢 職歴', career);

  const wish = [
    fi('希望業種','希望業種',true), fi('希望職種','希望職種',true),
    fi('希望勤務地','希望勤務地',true), fi('希望転職時期','希望転職時期'),
    fi('希望年収','希望年収'), fi('興味がある働き方','興味がある働き方',true),
    fi('その他希望条件','その他希望条件',true),
  ].filter(Boolean).join('');
  if (wish) html += section('🎯 希望条件', wish);

  let extra = '';
  for (let i = 1; i <= 5; i++) {
    extra += fi(`ゼミ・研究（${i}）所属ゼミ・研究室名`, `ゼミ${i}`);
    extra += fi(`ゼミ・研究（${i}）研究内容`, `ゼミ${i}内容`, true);
    extra += fi(`留学・海外生活（${i}）国・地域/期間`, `留学${i}`);
    extra += fi(`留学・海外生活（${i}）経験内容`, `留学${i}内容`, true);
    extra += fi(`クラブ・サークル（${i}）団体名/ジャンル`, `サークル${i}`);
    extra += fi(`クラブ・サークル（${i}）活動内容`, `サークル${i}内容`, true);
    extra += fi(`インターンシップ（${i}）企業名/期間`, `インターン${i}`);
    extra += fi(`インターンシップ（${i}）参加内容`, `インターン${i}内容`, true);
    extra += fi(`プログラミング（${i}）言語/レベル`, `プログラミング${i}`);
    extra += fi(`プログラミング（${i}）経験内容`, `プログラミング${i}内容`, true);
    extra += fi(`その他経験（${i}）タイトル`, `その他経験${i}`);
    extra += fi(`その他経験（${i}）内容`, `その他経験${i}内容`, true);
  }
  if (extra) html += section('🌱 課外活動・経験', extra);

  const note = fi('備考','備考',true);
  if (note) html += section('📝 備考', note);

  return html || '<div style="padding:12px 18px;color:var(--text-muted);">情報なし</div>';
}

function section(title, inner) {
  return `<div class="profile-section"><div class="section-title">${title}</div><div class="field-grid">${inner}</div></div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== Build candidate summary =====
function buildSummary(c) {
  const parts = [];
  if (c['候補者氏名']) parts.push(`氏名: ${c['候補者氏名']}`);
  if (c['年齢']) parts.push(`年齢: ${c['年齢']}`);
  if (c['性別']) parts.push(`性別: ${c['性別']}`);
  if (c['学歴1 学校名']) parts.push(`最終学歴: ${c['学歴1 学校名']}${c['学歴1 学部・学科'] ? ' ' + c['学歴1 学部・学科'] : ''}`);
  if (c['学歴1 卒業年月']) parts.push(`卒業予定: ${c['学歴1 卒業年月']}`);
  if (c['応募求人タイトル']) parts.push(`応募求人: ${c['応募求人タイトル']}`);
  if (c['応募経路']) parts.push(`応募経路: ${c['応募経路']}`);
  if (c['現住所']) parts.push(`現住所: ${c['現住所']}`);
  if (c['語学力']) parts.push(`語学力: ${c['語学力']}`);
  if (c['TOEIC'] && c['TOEIC'] !== '0') parts.push(`TOEIC: ${c['TOEIC']}`);

  for (let i = 1; i <= 3; i++) {
    const co = c[`職歴${i}の会社名`], role = c[`職歴${i}の部門・役職`], period = c[`職歴${i}の期間`];
    if (co) parts.push(`職歴${i}: ${co}${role ? ' / ' + role : ''}${period ? ' (' + period + ')' : ''}`);
  }

  if (c['ゼミ・研究（1）所属ゼミ・研究室名']) parts.push(`ゼミ: ${c['ゼミ・研究（1）所属ゼミ・研究室名']}`);
  if (c['ゼミ・研究（1）研究内容'] && c['ゼミ・研究（1）研究内容'].length < 200)
    parts.push(`研究内容: ${c['ゼミ・研究（1）研究内容']}`);
  if (c['クラブ・サークル（1）団体名/ジャンル']) parts.push(`課外活動: ${c['クラブ・サークル（1）団体名/ジャンル']}`);

  const pr = c['その他経験（1）内容'] || c['その他経験（1）タイトル'];
  if (pr && pr.length < 300) parts.push(`その他経験: ${pr}`);

  if (c['希望職種']) parts.push(`希望職種: ${c['希望職種']}`);
  if (c['希望勤務地']) parts.push(`希望勤務地: ${c['希望勤務地']}`);

  return parts.join('\n');
}

// ===== Build prompt =====
function buildPrompt(c, customInstruction) {
  const summary = buildSummary(c);
  const name = c['候補者氏名'] || '候補者';
  const school = c['学歴1 学校名'] || '';
  const dept = c['学歴1 学部・学科'] || '';
  const route = c['応募経路'] || '';

  return `あなたは採用担当者です。以下の候補者情報をもとに、オープンワーク経由でのスカウト返信に対する「面談案内メッセージ」を作成してください。

【候補者情報】
${summary}

【メッセージ作成の要件】
${customInstruction}

【出力形式】
・宛名（〇〇様）から始める
・自社の魅力や候補者の経歴への言及を含める
・面談日程調整のご案内を入れる
・300〜400文字程度
・丁寧かつ温かみのある文体
・署名は「採用担当」のみでOK
・必ずメッセージを最後まで完結させること。途中で終わらないこと。

候補者名: ${name}
学校: ${school}${dept ? ' ' + dept : ''}
応募経路: ${route}

上記の候補者に合わせた、パーソナライズされた面談案内メッセージを日本語で作成してください。`;
}

// ===== State =====
let candidates = [];
let selected = null;

// ===== Render list =====
function renderList() {
  const list = document.getElementById('candidateList');
  document.getElementById('countLabel').textContent = `${candidates.length}名`;
  if (!candidates.length) {
    list.innerHTML = '<div style="padding:24px 16px; color:var(--text-muted); font-size:13px; text-align:center;">候補者が見つかりませんでした</div>';
    return;
  }
  list.innerHTML = candidates.map((c, i) => {
    const route = c['応募経路'] === 'スカウト' ? 'scout' : 'self';
    const routeLabel = c['応募経路'] === 'スカウト' ? 'スカウト' : '自己応募';
    const school = c['学歴1 学校名'] || '学校不明';
    const age = c['年齢'] ? c['年齢'] : '';
    return `<div class="candidate-item" data-idx="${i}">
      <div class="name">${c['候補者氏名'] || '氏名不明'}</div>
      <div class="meta">
        <span class="badge ${route}">${routeLabel}</span>
        <span>${age}</span>
        <span>${school}</span>
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('.candidate-item').forEach(el => {
    el.addEventListener('click', () => {
      list.querySelectorAll('.candidate-item').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      selected = candidates[+el.dataset.idx];
      renderRight();
    });
  });
}

// ===== Render right panel =====
function renderRight() {
  const c = selected;
  if (!c) return;
  const panel = document.getElementById('rightPanel');
  const defaultInstruction = `・候補者の大学や専攻、強みに触れる\n・弊社の事業（ITコンサル・新規事業）との親和性を伝える\n・まずはカジュアルな面談を提案する\n・親しみやすいが誠実なトーン`;

  panel.innerHTML = `
    <div class="profile-pane" id="profilePane">
      <div class="profile-pane-header" onclick="toggleProfile()">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
            <span>👤 候補者プロフィール</span>
            <i class="toggle-icon open" id="profileToggleIcon" style="margin-left:auto;flex-shrink:0;">▲</i>
          </div>
          <div style="display:flex;flex-wrap:wrap;align-items:center;gap:5px 12px;font-size:12px;font-weight:400;">
            ${c['候補者氏名'] ? `<span style="font-weight:700;color:var(--text-primary);">${esc(c['候補者氏名'])}</span>` : ''}
            ${c['年齢'] ? `<span style="color:var(--text-secondary);">${esc(c['年齢'])}</span>` : ''}
            ${c['応募経路'] ? `<span class="badge ${c['応募経路']==='スカウト'?'scout':'self'}">${esc(c['応募経路'])}</span>` : ''}
            ${c['学歴1 学校名'] ? `<span style="color:var(--text-secondary);">🎓 ${esc(c['学歴1 学校名'])}${c['学歴1 学部・学科'] ? ' ' + esc(c['学歴1 学部・学科']) : ''}</span>` : ''}
            ${c['応募職種'] ? `<span style="color:var(--text-secondary);">💼 ${esc(c['応募職種'])}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="profile-pane-body" id="profileBody">
        ${buildFullProfile(c)}
      </div>
    </div>

    <div class="action-pane">
      <div class="card">
        <div class="card-header">🎯 メッセージ生成指示</div>
        <div class="prompt-section">
          <label>カスタム指示（編集できます）</label>
          <textarea id="instructionBox" rows="4">${defaultInstruction}</textarea>
        </div>
      </div>

      <div class="card">
        <div class="card-header">✦ Gemini でメッセージ生成</div>
        <div class="prompt-section">
          <button class="gemini-btn" onclick="generateMessage()" id="generateBtn" style="width:100%;justify-content:center;font-size:14px;padding:13px;">
            ✦ メッセージを生成する
          </button>
          <div id="generateStatus" style="font-size:12px;color:var(--text-muted);text-align:center;min-height:16px;"></div>
          <div id="messageResult" style="display:none;">
            <label>生成されたメッセージ</label>
            <textarea id="messageBox" rows="10" style="background:#fff;"></textarea>
            <div class="btn-row">
              <button class="btn btn-secondary" onclick="copyMessage()">📋 コピー</button>
              <span class="copy-toast" id="copyToast"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function setStatus(msg, color) {
  const el = document.getElementById('generateStatus');
  if (el) { el.textContent = msg; el.style.color = color; }
}

function copyMessage() {
  const txt = document.getElementById('messageBox').value;
  navigator.clipboard.writeText(txt).then(() => {
    const t = document.getElementById('copyToast');
    t.textContent = '✅ コピーしました！';
    t.style.opacity = 1; t.style.color = '#10B981';
    setTimeout(() => { t.style.opacity = 0; }, 2000);
  });
}

// ===== File upload =====
const uploadArea = document.getElementById('uploadArea');
const fileInput  = document.getElementById('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => loadFile(e.target.files[0]));
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('drag');
  loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    candidates = parseCSV(e.target.result);
    renderList();
    if (candidates.length > 0) {
      selected = candidates[0];
      document.querySelector('.candidate-item')?.classList.add('active');
      renderRight();
    }
  };
  reader.readAsText(file, 'UTF-8');
}
</script>
